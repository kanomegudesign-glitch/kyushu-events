name: 日次イベント更新

on:
  schedule:
    # 15:00 UTC = 00:00 JST（毎日深夜0時に実行）
    - cron: "0 15 * * *"
  workflow_dispatch: {}   # 手動実行も可能

permissions:
  contents: write          # README をコミットするために必要

concurrency:
  group: update-events
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # rebase を確実に行うため全履歴を取得

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存をインストール
        run: pip install -r requirements.txt

      - name: Playwright(Chromium) を導入
        run: python -m playwright install --with-deps chromium

      - name: イベントを収集して README を生成
        run: python scrape.py

      - name: 変更があればコミット
        run: |
          if [[ -z "$(git status --porcelain README.md events_canva.csv)" ]]; then
            echo "変更なし。コミットをスキップします。"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md events_canva.csv
          git commit -m "chore: イベント情報を自動更新 ($(date -u +%Y-%m-%d))"
          # リモートが進んでいても確実に反映するため、リベース＋リトライ
          for i in 1 2 3; do
            git fetch origin main
            git rebase -X theirs origin/main || git rebase --abort || true
            if git push origin HEAD:main; then
              echo "push 成功"
              exit 0
            fi
            echo "リモートが更新されたため再試行 ($i/3)..."
            sleep 5
          done
          echo "push に失敗しました"
          exit 1
